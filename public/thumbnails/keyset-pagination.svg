<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#042712"/>
      <stop offset="100%" stop-color="#155235"/>
    </linearGradient>
    <linearGradient id="lf" x1="100%" y1="0%" x2="20%" y2="0%">
      <stop offset="0%"   stop-color="#042712" stop-opacity="0"/>
      <stop offset="55%"  stop-color="#042712" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#042712" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="bf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#155235" stop-opacity="0"/>
      <stop offset="100%" stop-color="#042712" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Pattern -->
  
    <rect x="590" y="170" width="510" height="82" rx="14"
      fill="#6ee7b7" fill-opacity="0.06"
      stroke="#6ee7b7" stroke-width="1.5" stroke-opacity="0.2"/>
    <rect x="610" y="190" width="470" height="42" rx="6"
      fill="#6ee7b7" fill-opacity="0.04"/>
    <circle cx="620" cy="211" r="5" fill="#6ee7b7" fill-opacity="0.35"/>
    <circle cx="640" cy="211" r="5" fill="#6ee7b7" fill-opacity="0.25"/>
  
    <rect x="630" y="280" width="450" height="82" rx="14"
      fill="#6ee7b7" fill-opacity="0.11"
      stroke="#6ee7b7" stroke-width="1.5" stroke-opacity="0.32"/>
    <rect x="650" y="300" width="410" height="42" rx="6"
      fill="#6ee7b7" fill-opacity="0.07"/>
    <circle cx="660" cy="321" r="5" fill="#6ee7b7" fill-opacity="0.44999999999999996"/>
    <circle cx="680" cy="321" r="5" fill="#6ee7b7" fill-opacity="0.33"/>
  
    <rect x="670" y="390" width="390" height="82" rx="14"
      fill="#6ee7b7" fill-opacity="0.16"
      stroke="#6ee7b7" stroke-width="1.5" stroke-opacity="0.44"/>
    <rect x="690" y="410" width="350" height="42" rx="6"
      fill="#6ee7b7" fill-opacity="0.1"/>
    <circle cx="700" cy="431" r="5" fill="#6ee7b7" fill-opacity="0.55"/>
    <circle cx="720" cy="431" r="5" fill="#6ee7b7" fill-opacity="0.41000000000000003"/>
  

  <!-- Left & bottom fade overlays -->
  <rect width="1200" height="630" fill="url(#lf)"/>
  <rect width="1200" height="630" fill="url(#bf)"/>

  <!-- Category badge -->
  <rect x="60" y="52" width="98" height="32" rx="16"
    fill="#6ee7b7" fill-opacity="0.15"
    stroke="#6ee7b7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="74" y="73"
    font-family="system-ui,-apple-system,Segoe UI,sans-serif"
    font-size="13" font-weight="700" letter-spacing="2.5"
    fill="#6ee7b7" fill-opacity="0.95">BACKEND</text>

  <!-- Title -->
  
  <text x="60" y="516"
    font-family="system-ui,-apple-system,Segoe UI,sans-serif"
    font-size="46" font-weight="800"
    fill="white" fill-opacity="0.95">커서 기반 페이지네이션</text>
  <text x="60" y="568"
    font-family="system-ui,-apple-system,Segoe UI,sans-serif"
    font-size="46" font-weight="800"
    fill="white" fill-opacity="0.95">OFFSET의 한계와 keyset 방식</text>
</svg>