<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#1a3d6b"/>
    </linearGradient>
    <linearGradient id="lf" x1="100%" y1="0%" x2="20%" y2="0%">
      <stop offset="0%"   stop-color="#0d1b2e" stop-opacity="0"/>
      <stop offset="55%"  stop-color="#0d1b2e" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#0d1b2e" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="bf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a3d6b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1b2e" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Pattern -->
  
    <line x1="570" y1="490" x2="1130" y2="490" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.12"/>
<line x1="570" y1="410" x2="1130" y2="410" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.12"/>
<line x1="570" y1="330" x2="1130" y2="330" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.12"/>
<line x1="570" y1="250" x2="1130" y2="250" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.12"/>
<line x1="570" y1="170" x2="1130" y2="170" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.12"/>
    <polygon points="580,520 580,490 660,440 740,410 820,360 900,310 980,258 1060,220 1120,190 1120,520" fill="#34d399" fill-opacity="0.06"/>
    <polyline points="580,490 660,440 740,410 820,360 900,310 980,258 1060,220 1120,190" fill="none" stroke="#34d399" stroke-width="3"
      stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.65"/>
    
    <circle cx="580" cy="490" r="8" fill="#0d1b2e" stroke="#34d399" stroke-width="2.5" stroke-opacity="0.7"/>
    <circle cx="580" cy="490" r="3.5" fill="#34d399" fill-opacity="0.9"/>
  
    <circle cx="660" cy="440" r="8" fill="#0d1b2e" stroke="#34d399" stroke-width="2.5" stroke-opacity="0.7"/>
    <circle cx="660" cy="440" r="3.5" fill="#34d399" fill-opacity="0.9"/>
  
    <circle cx="740" cy="410" r="8" fill="#0d1b2e" stroke="#34d399" stroke-width="2.5" stroke-opacity="0.7"/>
    <circle cx="740" cy="410" r="3.5" fill="#34d399" fill-opacity="0.9"/>
  
    <circle cx="820" cy="360" r="8" fill="#0d1b2e" stroke="#34d399" stroke-width="2.5" stroke-opacity="0.7"/>
    <circle cx="820" cy="360" r="3.5" fill="#34d399" fill-opacity="0.9"/>
  
    <circle cx="900" cy="310" r="8" fill="#0d1b2e" stroke="#34d399" stroke-width="2.5" stroke-opacity="0.7"/>
    <circle cx="900" cy="310" r="3.5" fill="#34d399" fill-opacity="0.9"/>
  
    <circle cx="980" cy="258" r="8" fill="#0d1b2e" stroke="#34d399" stroke-width="2.5" stroke-opacity="0.7"/>
    <circle cx="980" cy="258" r="3.5" fill="#34d399" fill-opacity="0.9"/>
  
    <circle cx="1060" cy="220" r="8" fill="#0d1b2e" stroke="#34d399" stroke-width="2.5" stroke-opacity="0.7"/>
    <circle cx="1060" cy="220" r="3.5" fill="#34d399" fill-opacity="0.9"/>
  
    <circle cx="1120" cy="190" r="8" fill="#0d1b2e" stroke="#34d399" stroke-width="2.5" stroke-opacity="0.7"/>
    <circle cx="1120" cy="190" r="3.5" fill="#34d399" fill-opacity="0.9"/>
  
  

  <!-- Left & bottom fade overlays -->
  <rect width="1200" height="630" fill="url(#lf)"/>
  <rect width="1200" height="630" fill="url(#bf)"/>

  <!-- Category badge -->
  <rect x="60" y="52" width="98" height="32" rx="16"
    fill="#34d399" fill-opacity="0.15"
    stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
  <text x="74" y="73"
    font-family="system-ui,-apple-system,Segoe UI,sans-serif"
    font-size="13" font-weight="700" letter-spacing="2.5"
    fill="#34d399" fill-opacity="0.95">BACKEND</text>

  <!-- Title -->
  
  <text x="60" y="516"
    font-family="system-ui,-apple-system,Segoe UI,sans-serif"
    font-size="46" font-weight="800"
    fill="white" fill-opacity="0.95">시계열 데이터베이스</text>
  <text x="60" y="568"
    font-family="system-ui,-apple-system,Segoe UI,sans-serif"
    font-size="46" font-weight="800"
    fill="white" fill-opacity="0.95">시간이 핵심인 데이터를 다루는 방법</text>
</svg>