<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#100e1e"/>
      <stop offset="100%" stop-color="#2d2060"/>
    </linearGradient>
    <linearGradient id="lf" x1="100%" y1="0%" x2="20%" y2="0%">
      <stop offset="0%"   stop-color="#100e1e" stop-opacity="0"/>
      <stop offset="55%"  stop-color="#100e1e" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#100e1e" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="bf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2d2060" stop-opacity="0"/>
      <stop offset="100%" stop-color="#100e1e" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Pattern -->
  
    <defs>
      <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L7,3 L0,6 Z" fill="#fb923c" fill-opacity="0.55"/>
      </marker>
    </defs>
    <rect x="574" y="210" width="150" height="58" rx="10"
      fill="#fb923c" fill-opacity="0.1" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="728" y1="239" x2="784" y2="239" stroke="#fb923c" stroke-width="2" stroke-opacity="0.45" marker-end="url(#arr)"/>
    <rect x="788" y="210" width="150" height="58" rx="10"
      fill="#fb923c" fill-opacity="0.15" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="942" y1="239" x2="998" y2="239" stroke="#fb923c" stroke-width="2" stroke-opacity="0.45" marker-end="url(#arr)"/>
    <rect x="1002" y="210" width="130" height="58" rx="10"
      fill="#fb923c" fill-opacity="0.2" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="863" y1="268" x2="863" y2="340" stroke="#fb923c" stroke-width="2" stroke-opacity="0.4" marker-end="url(#arr)"/>
    <rect x="720" y="344" width="132" height="50" rx="10"
      fill="#fb923c" fill-opacity="0.09" stroke="#fb923c" stroke-width="1" stroke-opacity="0.3"/>
    <rect x="874" y="344" width="132" height="50" rx="10"
      fill="#fb923c" fill-opacity="0.09" stroke="#fb923c" stroke-width="1" stroke-opacity="0.3"/>
    <line x1="863" y1="340" x2="786" y2="344" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.3"/>
    <line x1="863" y1="340" x2="940" y2="344" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.3"/>
    <rect x="720" y="430" width="132" height="50" rx="10"
      fill="#fb923c" fill-opacity="0.07" stroke="#fb923c" stroke-width="1" stroke-opacity="0.2"/>
    <rect x="874" y="430" width="132" height="50" rx="10"
      fill="#fb923c" fill-opacity="0.07" stroke="#fb923c" stroke-width="1" stroke-opacity="0.2"/>
    <line x1="786" y1="394" x2="786" y2="430" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.25" marker-end="url(#arr)"/>
    <line x1="940" y1="394" x2="940" y2="430" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.25" marker-end="url(#arr)"/>
  

  <!-- Left & bottom fade overlays -->
  <rect width="1200" height="630" fill="url(#lf)"/>
  <rect width="1200" height="630" fill="url(#bf)"/>

  <!-- Category badge -->
  <rect x="60" y="52" width="148" height="32" rx="16"
    fill="#fb923c" fill-opacity="0.15"
    stroke="#fb923c" stroke-width="1" stroke-opacity="0.5"/>
  <text x="74" y="73"
    font-family="system-ui,-apple-system,Segoe UI,sans-serif"
    font-size="13" font-weight="700" letter-spacing="2.5"
    fill="#fb923c" fill-opacity="0.95">ARCHITECTURE</text>

  <!-- Title -->
  
  <text x="60" y="516"
    font-family="system-ui,-apple-system,Segoe UI,sans-serif"
    font-size="46" font-weight="800"
    fill="white" fill-opacity="0.95">Outbox Pattern</text>
  <text x="60" y="568"
    font-family="system-ui,-apple-system,Segoe UI,sans-serif"
    font-size="46" font-weight="800"
    fill="white" fill-opacity="0.95">DB 트랜잭션과 메시지 발행의 정합성</text>
</svg>