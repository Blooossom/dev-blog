<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
    <linearGradient id="lf" x1="100%" y1="0%" x2="20%" y2="0%">
      <stop offset="0%"   stop-color="#0a0f1a" stop-opacity="0"/>
      <stop offset="55%"  stop-color="#0a0f1a" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#0a0f1a" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="bf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a2a4a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0f1a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Pattern -->
  <line x1="840" y1="190" x2="990" y2="270"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.2"/>
<line x1="840" y1="190" x2="700" y2="310"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.2"/>
<line x1="990" y1="270" x2="1060" y2="400"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.2"/>
<line x1="990" y1="270" x2="830" y2="420"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.2"/>
<line x1="700" y1="310" x2="830" y2="420"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.2"/>
<line x1="1060" y1="400" x2="830" y2="420"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.2"/>
<line x1="830" y1="420" x2="660" y2="470"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.2"/>
<line x1="830" y1="420" x2="960" y2="490"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.2"/>
<line x1="700" y1="310" x2="660" y2="470"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.2"/>
    <circle cx="840" cy="190" r="34" fill="#60a5fa" fill-opacity="0.1"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="840" cy="190" r="26" fill="#60a5fa" fill-opacity="0.35"/>
  
    <circle cx="990" cy="270" r="26" fill="#60a5fa" fill-opacity="0.07"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="990" cy="270" r="18" fill="#60a5fa" fill-opacity="0.2"/>
  
    <circle cx="700" cy="310" r="26" fill="#60a5fa" fill-opacity="0.07"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="700" cy="310" r="18" fill="#60a5fa" fill-opacity="0.2"/>
  
    <circle cx="1060" cy="400" r="24" fill="#60a5fa" fill-opacity="0.07"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="1060" cy="400" r="16" fill="#60a5fa" fill-opacity="0.2"/>
  
    <circle cx="830" cy="420" r="30" fill="#60a5fa" fill-opacity="0.07"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="830" cy="420" r="22" fill="#60a5fa" fill-opacity="0.2"/>
  
    <circle cx="660" cy="470" r="24" fill="#60a5fa" fill-opacity="0.07"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="660" cy="470" r="16" fill="#60a5fa" fill-opacity="0.2"/>
  
    <circle cx="960" cy="490" r="22" fill="#60a5fa" fill-opacity="0.07"
      stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="960" cy="490" r="14" fill="#60a5fa" fill-opacity="0.2"/>
  

  <!-- Left & bottom fade overlays -->
  <rect width="1200" height="630" fill="url(#lf)"/>
  <rect width="1200" height="630" fill="url(#bf)"/>

  <!-- Category badge -->
  <rect x="60" y="52" width="98" height="32" rx="16"
    fill="#60a5fa" fill-opacity="0.15"
    stroke="#60a5fa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="74" y="73"
    font-family="system-ui,-apple-system,Segoe UI,sans-serif"
    font-size="13" font-weight="700" letter-spacing="2.5"
    fill="#60a5fa" fill-opacity="0.95">BACKEND</text>

  <!-- Title -->
  
  <text x="60" y="516"
    font-family="system-ui,-apple-system,Segoe UI,sans-serif"
    font-size="46" font-weight="800"
    fill="white" fill-opacity="0.95">Kafka</text>
  <text x="60" y="568"
    font-family="system-ui,-apple-system,Segoe UI,sans-serif"
    font-size="46" font-weight="800"
    fill="white" fill-opacity="0.95">분산 이벤트 스트리밍 플랫폼의 동작 원리</text>
</svg>