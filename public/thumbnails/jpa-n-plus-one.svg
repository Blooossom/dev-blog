<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#042712"/>
      <stop offset="100%" stop-color="#155235"/>
    </linearGradient>
    <linearGradient id="lf" x1="100%" y1="0%" x2="20%" y2="0%">
      <stop offset="0%"   stop-color="#042712" stop-opacity="0"/>
      <stop offset="55%"  stop-color="#042712" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#042712" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="bf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#155235" stop-opacity="0"/>
      <stop offset="100%" stop-color="#042712" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Pattern -->
  
    <path d="M 840 320 Q 694 196 642 338 Q 694 484 840 320"
      fill="#6ee7b7" fill-opacity="0.1" stroke="#6ee7b7" stroke-width="2" stroke-opacity="0.32"/>
    <path d="M 840 320 Q 986 196 1038 338 Q 986 484 840 320"
      fill="#6ee7b7" fill-opacity="0.1" stroke="#6ee7b7" stroke-width="2" stroke-opacity="0.32"/>
    <circle cx="840" cy="320" r="32" fill="#6ee7b7" fill-opacity="0.18"
      stroke="#6ee7b7" stroke-width="2" stroke-opacity="0.5"/>
    <circle cx="840" cy="320" r="14" fill="#6ee7b7" fill-opacity="0.5"/>
    <circle cx="796" cy="274" r="8" fill="#6ee7b7" fill-opacity="0.25"/>
    <circle cx="884" cy="274" r="8" fill="#6ee7b7" fill-opacity="0.25"/>
  

  <!-- Left & bottom fade overlays -->
  <rect width="1200" height="630" fill="url(#lf)"/>
  <rect width="1200" height="630" fill="url(#bf)"/>

  <!-- Category badge -->
  <rect x="60" y="52" width="98" height="32" rx="16"
    fill="#6ee7b7" fill-opacity="0.15"
    stroke="#6ee7b7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="74" y="73"
    font-family="system-ui,-apple-system,Segoe UI,sans-serif"
    font-size="13" font-weight="700" letter-spacing="2.5"
    fill="#6ee7b7" fill-opacity="0.95">BACKEND</text>

  <!-- Title -->
  
  <text x="60" y="516"
    font-family="system-ui,-apple-system,Segoe UI,sans-serif"
    font-size="46" font-weight="800"
